name: Deploy
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install
        run: bun install
        
      - name: Build

        run: bun run build
        env:
          VITE_OSU_CLIENT_ID: ${{ secrets.VITE_OSU_CLIENT_ID }}
          VITE_OSU_CLIENT_SECRET: ${{ secrets.VITE_OSU_CLIENT_SECRET }}
          
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
